spring.application.name=workspace-mngt

# ==========================
# Server Configuration
# ==========================
server.port=8080

# ==========================
# MySQL Database
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/workspace_management
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# MyBatis Configuration
# ==========================
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.workspace.dto
mybatis.configuration.map-underscore-to-camel-case=true

# ==========================
# Logging
# ==========================
#logging.level.org.mybatis=DEBUG
#logging.level.com.workspace=DEBUG

# ==========================
# Logging
# ==========================

logging.level.root=INFO

logging.level.com.workspace=DEBUG

logging.level.org.mybatis=DEBUG

# ==========================
# JWt
# ==========================

jwt.secret=workspace-secret-key-mayur-learning-springboot-2026

jwt.expiration=3600000